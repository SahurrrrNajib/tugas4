<!DOCTYPE html>
<html>
<head>
    <title>Prediksi Kriminalitas ANN</title>
    <style>
        body{
            font-family: Arial;
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            color:white;
            text-align:center;
            padding:40px;
        }

        .card{
            background: rgba(255,255,255,0.1);
            padding:30px;
            border-radius:15px;
            width:400px;
            margin:auto;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
        }

        input{
            padding:10px;
            width:80%;
            border:none;
            border-radius:8px;
            margin-top:10px;
        }

        button{
            padding:10px 20px;
            border:none;
            border-radius:8px;
            background:#00c6ff;
            color:white;
            margin-top:15px;
            cursor:pointer;
        }

        img{
            margin-top:20px;
            width:80%;
            border-radius:10px;
        }
    </style>
</head>
<body>

    <h1>Prediksi Kriminalitas ANN</h1>

    <div class="card">
        <form method="POST">
            <label>Masukkan Tahun</label><br>
            <input type="number" name="tahun" required>
            <br>
            <button type="submit">Prediksi</button>
        </form>

        {% if prediksi %}
            <h2>Hasil Prediksi: {{ prediksi }} kasus</h2>
            <img src="{{ url_for('static', filename='grafik.png') }}">
        {% endif %}
    </div>

</body>
</html>
